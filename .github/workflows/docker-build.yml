name: "🐳 Build Docker Image"

on:
  workflow_dispatch:
    inputs:
      docker_username:
        description: "👤 Docker Hub Username"
        required: true
        type: string
        default: ""
      docker_repo:
        description: "📦 Repository Name"
        required: false
        type: string
        default: "bale-yt-downloader"
      docker_token:
        description: "🔑 Docker Hub Access Token"
        required: true
        type: string
        default: ""
      image_tag:
        description: "🏷️ Image Tag"
        required: false
        type: string
        default: "latest"

jobs:
  build:
    name: "🔨 Build & Push"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🔑 Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ github.event.inputs.docker_username }}
          password: ${{ github.event.inputs.docker_token }}

      - name: "🐳 Build & Push"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.docker_repo }}:${{ github.event.inputs.image_tag }}

      - name: "✅ Success"
        if: success()
        run: |
          echo "════════════════════════════════════════════"
          echo "  ✅ Image Built & Pushed!"
          echo "  📦 ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.docker_repo }}:${{ github.event.inputs.image_tag }}"
          echo "  🔗 https://hub.docker.com/r/${{ github.event.inputs.docker_username }}/${{ github.event.inputs.docker_repo }}"
          echo "════════════════════════════════════════════"
